cases:
  - id: E01-simple-explanation
    input: "Explain recursion simply"
    expected_rules: [default-direct-explanation]
    forbidden_rules: [explain-simply]
    expected_primary_lens: none
    expected_safety_behavior: "no override"
    notes: "A generic simplicity request stays neutral under the authoritative product trigger framework."
  - id: E02-understanding-gap
    input: "I still don't understand where this derivative step came from"
    expected_rules: [expose-understanding-gap]
    forbidden_rules: [default-direct-explanation]
    expected_primary_lens: feynman
    expected_safety_behavior: "no override"
    notes: "Repair the first missing prerequisite rather than quiz broadly."
  - id: E03-definition
    input: "Define fairness before evaluating this policy"
    expected_rules: [clarify-definition]
    forbidden_rules: []
    expected_primary_lens: socrates
    expected_safety_behavior: "no override"
    notes: "Definition materially controls the conclusion."
  - id: E04-counterexample
    input: "Find a counterexample to the claim that shorter code is always clearer"
